<style type="text/css">
/* 全局重置与基础样式 */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #f5f5f5;
    font-family: "Microsoft Yahei", "SimHei", "楷体", serif;
}

/* 容器表格样式 */
.nav-table {
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    border-collapse: collapse;
    background-color: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    overflow: hidden;
}

/* 头部图片单元格 */
.header-cell {
    padding: 0;
    background-color: transparent;
}

.header-cell img {
    width: 100%;
    height: auto;
    display: block;
    object-fit: cover;
}

/* 导航按钮单元格 */
.nav-cell {
    text-align: center;
    padding: 15px 0;
    position: relative;
}

/* 导航链接样式 */
.nav-link {
    font-family: "楷体", "Microsoft Yahei", serif;
    font-size: 28px;
    color: #8B5A2B; /* 复古棕金色，与下方页面配色统一 */
    text-decoration: none;
    padding: 12px 40px;
    border-radius: 8px;
    position: relative;
    display: inline-block;
    font-weight: 600;
    letter-spacing: 2px;
}

/* 响应式适配 - 移动端 */
@media (max-width: 768px) {
    .nav-table {
        max-width: 100%;
        margin: 0 10px;
        border-radius: 8px;
    }

    .nav-link {
        font-size: 22px;
        padding: 10px 20px;
    }

    .nav-cell {
        padding: 10px 0;
    }
}
</style>
</head>
